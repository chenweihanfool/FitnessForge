name: Weekly Radar Snapshot

on:
  # 排程已改由自架主機上的 HERMES 負責觸發，這裡只保留手動觸發做為除錯用途，
  # 避免兩邊同時排程造成重複呼叫（雖然 /auto 端點是 upsert，不會產生重複資料，
  # 但沒必要平白多打一次）。
  workflow_dispatch:

jobs:
  snapshot:
    name: Save weekly radar snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call auto-snapshot API
        run: |
          echo "📡 Triggering radar snapshot at $(date -u '+%Y-%m-%d %H:%M:%S') UTC"

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --max-time 60 \
            -X POST https://cwh2023.asuscomm.com/fitness/api/stats/radar-snapshot/auto \
            -H "Content-Type: application/json" \
            -H "x-snapshot-secret: ${{ secrets.SNAPSHOT_SECRET }}")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(cat /tmp/response.json)"

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Radar snapshot saved successfully"
          else
            echo "❌ Snapshot failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
